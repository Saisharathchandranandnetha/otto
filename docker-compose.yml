services:
  db:
    image: pgvector/pgvector:pg16
    container_name: otto-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-otto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-otto}
      POSTGRES_DB: ${POSTGRES_DB:-otto}
    ports:
      - "5432:5432"
    volumes:
      - otto_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otto"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: otto-redis
    ports:
      - "6379:6379"
    volumes:
      - otto_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 5

  # --- n8n Workflow Automation Engine ---
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: otto_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      # Core settings
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_PERSONALIZATION_COMPANY_NAME=Otto AI
      # This gets replaced with ngrok URL at runtime — see setup script
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - WEBHOOK_TUNNEL_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      # Database — use Postgres instead of SQLite for production
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME:-n8n_db}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-otto}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-otto}
      # Security
      - N8N_SECURE_COOKIE=false
      - N8N_BASIC_AUTH_ACTIVE=false
      # Execution settings
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      # License — for paid n8n license
      - N8N_LICENSE_ACTIVATION_KEY=${N8N_LICENSE_KEY:-}
      # Generic timezone
      - GENERIC_TIMEZONE=Asia/Kolkata
      # Integration credentials (Telegram + Dify + Webhook)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DIFY_API_KEY=${DIFY_API_KEY:-}
      - DIFY_API_URL=${DIFY_API_URL:-}
      - OTTO_WEBHOOK_SECRET=${OTTO_WEBHOOK_SECRET:-secret-otto-webhook-token}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy

  # --- ngrok tunnel (makes n8n reachable by Telegram via HTTPS) ---
  ngrok:
    image: ngrok/ngrok:latest
    container_name: otto_ngrok
    restart: always
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http n8n:5678
    ports:
      - "4040:4040"
    depends_on:
      - n8n

  ai-engine:
    build:
      context: ./apps/ai-engine
      dockerfile: Dockerfile
    container_name: otto-ai-engine
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=otto
      - DB_PASSWORD=otto
      - DB_DATABASE=otto
      - DB_POSTGRESDB_SCHEMA=ai_engine
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/1
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-worker:
    build:
      context: ./apps/ai-engine
      dockerfile: Dockerfile
    container_name: otto-ai-worker
    command: celery -A app.celery worker -P gevent -c 1 -Q dataset,generation,mail,ops_trace
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=otto
      - DB_PASSWORD=otto
      - DB_DATABASE=otto
      - DB_POSTGRESDB_SCHEMA=ai_engine
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  otto_pgdata:
  otto_redis:
  n8n_data:
