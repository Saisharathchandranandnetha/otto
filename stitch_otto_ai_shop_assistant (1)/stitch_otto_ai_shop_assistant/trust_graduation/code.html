<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Otto - Trust Graduation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error": "#ba1a1a",
                        "on-secondary-container": "#3d6c6d",
                        "primary-fixed": "#ffdbd2",
                        "tertiary-container": "#7b745e",
                        "error-container": "#ffdad6",
                        "on-background": "#1b1c1a",
                        "surface-variant": "#e4e2de",
                        "secondary-fixed": "#baecec",
                        "primary-container": "#bc563c",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#3c0800",
                        "tertiary-fixed-dim": "#cec6ad",
                        "background": "#fbf9f5",
                        "on-surface": "#1b1c1a",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#dbdad6",
                        "on-tertiary-fixed-variant": "#4c4733",
                        "on-secondary-fixed-variant": "#1c4e4f",
                        "secondary-container": "#baecec",
                        "on-tertiary-fixed": "#1f1c0b",
                        "surface-tint": "#9f4128",
                        "surface-container": "#efeeea",
                        "surface-container-highest": "#e4e2de",
                        "outline-variant": "#ddc0ba",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#30312e",
                        "secondary": "#366667",
                        "inverse-on-surface": "#f2f0ed",
                        "tertiary": "#615c47",
                        "on-tertiary-container": "#fffbff",
                        "primary": "#9c3e26",
                        "surface-bright": "#fbf9f5",
                        "surface": "#fbf9f5",
                        "outline": "#89726c",
                        "primary-fixed-dim": "#ffb4a2",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#56423d",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#7f2a13",
                        "tertiary-fixed": "#ebe2c8",
                        "secondary-fixed-dim": "#9fcfd0",
                        "surface-container-high": "#eae8e4",
                        "on-secondary-fixed": "#002020",
                        "inverse-primary": "#ffb4a2",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f5f3ef",
                        "on-primary-container": "#fffbff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "touch-target-min": "48px",
                        "gutter": "16px",
                        "base": "8px",
                        "container-padding": "20px",
                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "stack-lg": "40px"
                    },
                    fontFamily: {
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "body-lg": ["18px", { "lineHeight": "26px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(253, 251, 247, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        .celebration-glow {
            background: radial-gradient(circle at center, rgba(188, 86, 60, 0.15) 0%, rgba(253, 251, 247, 0) 70%);
        }

        /* Number Input Reset */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md antialiased overflow-hidden">
<!-- App Background Context (Blurred) -->
<div aria-hidden="true" class="fixed inset-0 z-0 filter blur-sm scale-105 pointer-events-none opacity-40 transition-all duration-500 bg-surface-container-low">
<!-- Mock Top App Bar -->
<header class="flex justify-between items-center w-full px-container-padding h-touch-target-min bg-background opacity-50">
<span class="material-symbols-outlined text-on-surface-variant">language</span>
<span class="font-headline-md font-bold text-primary">Otto</span>
<span class="material-symbols-outlined text-on-surface-variant">verified_user</span>
</header>
<!-- Mock Content -->
<div class="p-container-padding space-y-stack-md mt-4">
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm h-32 border border-surface-variant"></div>
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm h-48 border border-surface-variant"></div>
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm h-32 border border-surface-variant"></div>
</div>
</div>
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 z-40 bg-on-surface/20 backdrop-blur-sm transition-opacity"></div>
<!-- Trust Graduation Card Modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-container-padding">
<!-- Main Card -->
<div class="relative w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_8px_32px_rgba(27,28,26,0.12)] border border-surface-variant overflow-hidden transform transition-all translate-y-0 opacity-100 scale-100 animate-[slideUp_0.4s_ease-out]">
<!-- Celebratory Header Area -->
<div class="relative h-48 w-full celebration-glow flex flex-col items-center justify-center border-b border-surface-container-high">
<!-- Gentle Glow Seal -->
<div class="relative w-24 h-24 rounded-full bg-primary-container/10 flex items-center justify-center mb-4">
<div class="absolute inset-0 rounded-full border-2 border-primary/20 scale-110 animate-pulse"></div>
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">
                            verified
                        </span>
</div>
</div>
</div>
<!-- Content Area -->
<div class="px-container-padding py-stack-md text-center">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-stack-sm">
                    Otto has earned your trust for Reorder Purchase Orders
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-md">
                    You've approved this 3 times. Otto can now handle these automatically, up to your defined limit, and you can undo any action within 1 hour.
                </p>
<!-- Interactive Stepper -->
<div class="bg-surface-container-low rounded-lg p-4 mb-stack-md border border-surface-variant/50">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2" for="limit-input">Automatic Approval Limit</label>
<div class="flex items-center justify-between bg-surface-container-lowest rounded border border-surface-variant focus-within:border-secondary focus-within:ring-1 focus-within:ring-secondary transition-colors">
<!-- Decrease Button -->
<button aria-label="Decrease limit" class="h-touch-target-min w-12 flex items-center justify-center text-on-surface hover:bg-surface-container transition-colors rounded-l active:scale-95" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<!-- Value Display/Input -->
<div class="flex-1 flex items-center justify-center">
<span class="font-headline-sm text-headline-sm text-on-surface mr-1">₹</span>
<input class="w-24 text-center font-headline-sm text-headline-sm text-on-surface bg-transparent border-none p-0 focus:ring-0 outline-none" id="limit-input" type="number" value="10000"/>
</div>
<!-- Increase Button -->
<button aria-label="Increase limit" class="h-touch-target-min w-12 flex items-center justify-center text-on-surface hover:bg-surface-container transition-colors rounded-r active:scale-95" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-stack-sm mt-stack-lg">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-label-lg text-label-lg rounded-full shadow-sm hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">auto_awesome</span>
                        Let Otto handle this
                    </button>
<button class="w-full h-touch-target-min text-primary font-label-lg text-label-lg rounded-full hover:bg-surface-container-low active:scale-95 transition-all flex items-center justify-center">
                        Not yet, keep asking me
                    </button>
</div>
</div>
<!-- Footer Note -->
<div class="bg-surface-container-lowest py-3 px-container-padding text-center border-t border-surface-container-high">
<span class="font-label-sm text-label-sm text-on-surface-variant/70 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]">info</span>
                    You can revoke this anytime from Settings.
                </span>
</div>
</div>
</div>
<!-- Simple entry animation defined in style tags above, implemented inline here for context -->
<style>
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</body></html>
